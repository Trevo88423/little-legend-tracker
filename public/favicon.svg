<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e86c50"/>
      <stop offset="100%" stop-color="#d4553c"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#ffe8d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#b8442e" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Inner subtle ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.15"/>
  <!-- Star shape -->
  <g filter="shadow">
    <path d="M256 80 l44 90 99 14 -72 70 17 99 -88-46 -88 46 17-99 -72-70 99-14z"
          fill="url(#star)" filter="glow"/>
  </g>
  <!-- Small heart inside star -->
  <path d="M256 240 c-8-16-28-20-36-8 c-8 12 0 28 36 48 c36-20 44-36 36-48 c-8-12-28-4-36 8z"
        fill="#e86c50" opacity="0.7"/>
  <!-- Small sparkles -->
  <circle cx="160" cy="140" r="6" fill="#fff" opacity="0.6"/>
  <circle cx="370" cy="170" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="130" cy="340" r="3" fill="#fff" opacity="0.4"/>
  <circle cx="380" cy="360" r="5" fill="#fff" opacity="0.5"/>
</svg>
